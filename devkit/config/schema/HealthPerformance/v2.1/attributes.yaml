openapi: 3.1.1
$id: "https://schema.beckn.io/HealthPerformance/v2.1/attributes.yaml"
info:
  title: HealthPerformance Schema
  version: "2.1.0"
  description: >
    Performance-level attributes for a health service engagement.
    Extends ServicePerformance/v2.1 with health service type discriminator, clinical
    follow-up urgency, provisional diagnosis, generated artifact references,
    deletion attestation, and structured clinical interpretation.
    Inherited base fields (appointmentWindowStart, appointmentWindowEnd,
    confirmedAppointmentTime, serviceLocation, providerConfirmedCompletion,
    clientConfirmedCompletion, serviceNotes, followUpRequired, followUpDate)
    come from ServicePerformance/v2.1.
  x-beckn-container: performanceAttributes

components:
  schemas:
    HealthPerformance:
      type: object
      x-beckn-container: performanceAttributes
      x-status: under-review
      x-tags:
        - health
        - health-service
        - performance
      x-beckn-extends: "https://schema.beckn.io/ServicePerformance/v2.1/attributes.yaml#/components/schemas/ServicePerformance"
      x-jsonld:
        "@context": "https://schema.beckn.io/HealthPerformance/v2.1/context.jsonld"
        "@type": "hpe:HealthPerformance"
      allOf:
        - $ref: "https://schema.beckn.io/ServicePerformance/v2.1/attributes.yaml#/components/schemas/ServicePerformance"
        # Conditional field requirements by healthServiceType.
        # Both if/then conditions must live inside allOf[] — YAML does not allow
        # duplicate mapping keys (if, then) at the same schema level.
        - if:
            properties:
              healthServiceType:
                const: DIAGNOSTIC_ANALYTICS
          then:
            required: [clinicalInterpretation, artifactsGenerated]
        - if:
            properties:
              healthServiceType:
                enum: [PHYSICAL_CONSULTATION, LAB_TEST]
          then:
            required: [serviceLocation]
      required:
        - healthServiceType
      properties:
        healthServiceType:
          type: string
          enum:
            - DIAGNOSTIC_ANALYTICS
            - TELECONSULTATION
            - PHYSICAL_CONSULTATION
            - RADIOLOGY
            - LAB_TEST
            - PHARMACY_DISPENSING
          description: Health service type — drives conditional requirements
          x-jsonld-id: "hpe:healthServiceType"
        attendanceStatus:
          type: string
          enum:
            - ATTENDED
            - NO_SHOW
            - LEFT_WITHOUT_BEING_SEEN
          description: >
            Attendance outcome of the engagement. Drives the T1 referral lifecycle
            (ATTENDED / NO_SHOW). Optional — set for referred / booked engagements.
          x-jsonld-id: "hpe:attendanceStatus"
        outcomeNoteRef:
          type: string
          description: >
            Label of the credential-scoped outcome-note Document in the Performance's
            Descriptor.docs[]. The structured outcome note returned to the referrer —
            travels as a reference, never inline (the url lives in the core Document).
            Optional.
          x-jsonld-id: "hpe:outcomeNoteRef"
        outcomeDeliveredAt:
          type: string
          format: date-time
          description: Timestamp the structured outcome note was delivered to the referrer (ISO 8601). Optional.
          x-jsonld-id: "hpe:outcomeDeliveredAt"
        outcomeSlaBreached:
          type: boolean
          description: >
            Whether the outcome SLA was breached. Feeds the T1 SLA_BREACHED lifecycle state.
            Optional.
          x-jsonld-id: "hpe:outcomeSlaBreached"
        followupRecommendationCode:
          type: string
          enum:
            - NONE
            - ROUTINE
            - SOON
            - URGENT
            - EMERGENCY
          description: >
            Clinical urgency of follow-up recommended after service delivery.
            Extends the inherited followUpRequired boolean with clinical grading.
            NONE: no follow-up required (followUpRequired = false).
            ROUTINE: follow up at next scheduled visit.
            SOON: follow up within 1–4 weeks.
            URGENT: follow up within 48–72 hours.
            EMERGENCY: immediate referral required.
          x-jsonld-id: "hpe:followupRecommendationCode"
        provisionalDiagnosis:
          type: string
          description: >
            Provisional diagnosis or clinical impression from the service delivery.
            Free text or ICD-10 code. Applicable to DIAGNOSTIC_ANALYTICS,
            TELECONSULTATION, and PHYSICAL_CONSULTATION.
          x-jsonld-id: "hpe:provisionalDiagnosis"
        artifactsGenerated:
          type: array
          items:
            type: string
          description: >
            Labels of Documents in the Performance's Descriptor.docs[] array
            representing generated clinical artifacts (reports, prescriptions,
            recordings, images, etc.).
          x-jsonld-id: "hpe:artifactsGenerated"
        deletionAttestation:
          type: object
          description: >
            Attestation that raw patient data (audio, images, etc.) has been deleted
            per the consent's data retention terms. Present when consent.withdrawnAt
            is set or dataRetentionDays has elapsed.
          x-jsonld-id: "hpe:deletionAttestation"
          properties:
            attestedAt:
              type: string
              format: date-time
              description: Timestamp of deletion (ISO 8601)
            attestedBy:
              type: string
              description: Provider NP ID attesting the deletion
            attestationDocRef:
              type: string
              description: Label of the attestation Document in Descriptor.docs[]
        clinicalInterpretation:
          type: object
          description: >
            Structured output from the AI or automated analytical engine.
            Required when healthServiceType is DIAGNOSTIC_ANALYTICS.
            For other service types, clinical notes go in the inherited serviceNotes field.
          x-jsonld-id: "hpe:clinicalInterpretation"
          properties:
            confidence:
              type: number
              minimum: 0
              maximum: 1
              description: Model confidence score for the primary output (0–1)
            flaggedFindings:
              type: array
              items:
                type: string
              description: List of clinical findings flagged by the model
            modelOutputRef:
              type: string
              description: Label of the raw model output Document in Descriptor.docs[]
            reviewedBySpecialist:
              type: boolean
              description: Whether the model output has been reviewed by a specialist
            specialistReviewAt:
              type: string
              format: date-time
              description: Timestamp of specialist review (ISO 8601)

