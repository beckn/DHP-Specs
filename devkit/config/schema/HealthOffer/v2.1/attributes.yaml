openapi: 3.1.1
$id: "https://schema.beckn.io/HealthOffer/v2.1/attributes.yaml"
info:
  title: HealthOffer Schema
  version: "2.1.0"
  description: >
    Offer-level attributes for a health service.
    Extends ServiceOffer/v2.1 with health service type discriminator and
    health-specific offer types (SINGLE_EVENT, BULK_PROCUREMENT, CAMP).
    Inherited base fields (minimumQuantity, maximumQuantity, requiresAdvanceBooking,
    bulkDiscountAvailable, eligibilityCriteria, validityPeriodDays, cancellationPolicies)
    come from ServiceOffer/v2.1.
  x-beckn-container: offerAttributes

components:
  schemas:
    HealthOffer:
      type: object
      x-beckn-container: offerAttributes
      x-status: under-review
      x-tags:
        - health
        - health-service
        - offer
      x-beckn-extends: "https://schema.beckn.io/ServiceOffer/v2.1/attributes.yaml#/components/schemas/ServiceOffer"
      x-jsonld:
        "@context": "https://schema.beckn.io/HealthOffer/v2.1/context.jsonld"
        "@type": "hof:HealthOffer"
      allOf:
        - $ref: "https://schema.beckn.io/ServiceOffer/v2.1/attributes.yaml#/components/schemas/ServiceOffer"
      required:
        - healthServiceType
        - offerType
      properties:
        healthServiceType:
          type: string
          enum:
            - DIAGNOSTIC_ANALYTICS
            - TELECONSULTATION
            - PHYSICAL_CONSULTATION
            - RADIOLOGY
            - LAB_TEST
          description: Health service type this offer is for
          x-jsonld-id: "hof:healthServiceType"
        offerType:
          type: string
          enum:
            - SINGLE_EVENT
            - BULK_PROCUREMENT
            - CAMP
          description: >
            Type of offer.
            SINGLE_EVENT: one engagement for one patient (UC1 pay-at-counter).
            BULK_PROCUREMENT: pre-purchase of multiple units by an implementing agency (UC0).
            CAMP: fixed-date multi-patient camp engagement (UC2).
          x-jsonld-id: "hof:offerType"

      # BULK_PROCUREMENT offers must specify minimum and maximum quantity and validity
      if:
        properties:
          offerType:
            const: BULK_PROCUREMENT
      then:
        required: [minimumQuantity, maximumQuantity, validityPeriodDays]
